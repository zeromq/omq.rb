name: Release

on:
  push:
    tags:
      - 'omq-v*'
      - 'omq-backend-rust-v*'
      - 'omq-backend-libzmq-v*'
      - 'omq-lz4-v*'
      - 'omq-qos-v*'
      - 'omq-ractor-v*'
      - 'omq-websocket-v*'
      - 'omq-zstd-v*'
      - 'protocol-zmtp-v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: timeout 240 bundle exec rake

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/checkout@v4

      - name: Select package
        id: package
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            omq-v*)
              package="omq"
              dir="."
              gemspec="omq.gemspec"
              ruby="4.0"
              ;;
            omq-backend-rust-v*)
              package="omq-backend-rust"
              dir="gems/omq-backend-rust"
              gemspec="$dir/omq-backend-rust.gemspec"
              ruby="4.0"
              ;;
            omq-backend-libzmq-v*)
              package="omq-backend-libzmq"
              dir="gems/omq-backend-libzmq"
              gemspec="$dir/omq-backend-libzmq.gemspec"
              ruby="4.0"
              ;;
            omq-lz4-v*)
              package="omq-lz4"
              dir="gems/omq-lz4"
              gemspec="$dir/omq-lz4.gemspec"
              ruby="4.0"
              ;;
            omq-qos-v*)
              package="omq-qos"
              dir="gems/omq-qos"
              gemspec="$dir/omq-qos.gemspec"
              ruby="4.0"
              ;;
            omq-ractor-v*)
              package="omq-ractor"
              dir="gems/omq-ractor"
              gemspec="$dir/omq-ractor.gemspec"
              ruby="4.0"
              ;;
            omq-websocket-v*)
              package="omq-websocket"
              dir="gems/omq-websocket"
              gemspec="$dir/omq-websocket.gemspec"
              ruby="4.0"
              ;;
            omq-zstd-v*)
              package="omq-zstd"
              dir="gems/omq-zstd"
              gemspec="$dir/omq-zstd.gemspec"
              ruby="4.0"
              ;;
            protocol-zmtp-v*)
              package="protocol-zmtp"
              dir="gems/protocol-zmtp"
              gemspec="$dir/protocol-zmtp.gemspec"
              ruby="4.0"
              ;;
            *)
              echo "Unsupported tag: $tag" >&2
              exit 1
              ;;
          esac

          version="${tag#${package}-v}"
          {
            echo "package=$package"
            echo "dir=$dir"
            echo "gemspec=$gemspec"
            echo "gemspec_file=$(basename "$gemspec")"
            echo "ruby=$ruby"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.package.outputs.ruby }}

      - name: Install package bundle
        working-directory: ${{ steps.package.outputs.dir }}
        env:
          BUNDLE_WITHOUT: bench
        run: |
          bundle config set --local without bench
          bundle install --jobs 4 --retry 3

      - name: Verify tag version
        working-directory: ${{ steps.package.outputs.dir }}
        run: |
          ruby -e 'spec = Gem::Specification.load(ARGV[0]); abort "tag version #{ARGV[1]} != gemspec #{spec.version}" unless spec.version.to_s == ARGV[1]' "${{ steps.package.outputs.gemspec_file }}" "${{ steps.package.outputs.version }}"

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
        env:
          BUNDLE_WITHOUT: bench
        with:
          working-directory: ${{ steps.package.outputs.dir }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "${{ steps.package.outputs.dir }}"/pkg/*.gem --generate-notes
